<svg xmlns="http://www.w3.org/2000/svg" style="isolation:isolate" viewBox="0 0 128 64">
	<style>
	:root {
		--animation-duration: 5s;
	}
	@keyframes breath-ears {
		0% {
			transform: translateY(-3px);
		}
		50% {
			transform: translateY(0px);
		}
		100% {
			transform: translateY(-3px);
		}
	}
	@keyframes breath {
		0% {
			transform: translateY(0px);
		}
		50% {
			transform: translateY(-2px);
		}
		100% {
			transform: translateY(0px);
		}
	}
	@keyframes breath-face {
		0% {
			transform: translateY(0px);
		}
		50% {
			transform: translateY(-1px);
		}
		100% {
			transform: translateY(0px);
		}
	}
	.face {
		animation: breath var(--animation-duration) ease-in-out infinite;
	}
	.breath-face {
		animation: breath-face var(--animation-duration) ease-in-out infinite;
	}
	.breath-ears {
		animation: breath-ears var(--animation-duration) ease-in-out infinite;
	}
	.face path,
	.face circle {
		transform: translate(32px, 0);
	}
	.stroke-black {
		stroke: #000;
	}
	.fill-black {
		fill: #000;
	}
	.fill-gray {
		fill: #CCC;
	}
	.fill-none {
		fill: none;
	}
	.fill-white {
		fill: #fff;
	}
	</style>
	<g class="face" fill-rule="evenodd" stroke-miterlimit="3" stroke-linecap="round" stroke-linejoin="round">
		<g class="breath-ears">
			<path class="stroke-black fill-gray" d="M11 12l-4 3v4l2 5v9l2 2h42l2-2v-9l2-5v-4l-4-3H11z"/>
			<circle class="fill-black" cx="12" cy="31" r="2"/>
			<circle class="fill-black" cx="52" cy="31" r="2"/>
		</g>
		<path class="fill-white stroke-black" d="M10 0v23l5 20 7 13 4 3 6 1 6-1 4-3 7-13 5-20V0"/>
		<g class="breath-face">
			<path class="fill-none stroke-black" d="M26 49l3 1h3m-8-3h2l2-1 3 1h1m-7-3l3-1 3 1h1m-2 9h2m-2-26v5m-4 3v2l2 1h1m0-2h-1l1-2 2 2h1M15 19l2-2 3-1 4 1 3 2m-10 2l1 1 2 1h2l2-1 2-1m1 0l-3-2-3-1-4 1-2 2m23 28l-3 1h-3m8-3h-2l-2-1-3 1h-1m7-3l-3-1-3 1h-1m2 9h-2m2-26v5m4 3v2l-2 1h-1m0-2h1l-1-2-2 2h-1m17-17l-2-2-3-1-4 1-3 2m10 2l-1 1-2 1h-2l-2-1-2-1m-1 0l3-2 3-1 4 1 2 2"/>
